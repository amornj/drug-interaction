# dabigatran + ketoconazole (1546356 | 6135)
# NOT in DDInter (dabigatran absent from dataset). Ketoconazole is a strong
# P-gp inhibitor; co-administration increases dabigatran exposure ~2.5×,
# raising bleeding risk significantly.
- pair: ["6135", "1546356"]
  severity: Major
  verdict: >-
    Ketoconazole strongly inhibits P-glycoprotein, markedly increasing
    dabigatran absorption and reducing renal clearance. Dabigatran exposure
    can rise ~2.5-fold, significantly increasing major bleeding risk.
  mechanism_class: P-gp inhibition
  management: >-
    Avoid concurrent use if possible. If unavoidable, monitor closely for
    bleeding signs (haemoglobin drop, melena, haematoma expansion) and
    consider dose reduction or alternative antifungal (e.g., fluconazole
    with lower P-gp inhibition).
  sources:
    - name: Clinical overlay
      version: "2026-04"

